spring:
  application:
    name: control-plane-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gateway_control?options=-c%20TimeZone%3DUTC}
    username: ${DB_USERNAME:gateway}
    password: ${DB_PASSWORD:gateway}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  seed-demo-data: ${SEED_DEMO_DATA:true}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  redis:
    routes-key: gateway:routes
    policies-key: gateway:policies
    api-keys-key: gateway:api-keys
