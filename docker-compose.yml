version: "3.9"

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: gateway_control
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gateway_control?options=-c%20TimeZone%3DUTC
      DB_USERNAME: gateway
      DB_PASSWORD: gateway
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8081
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8081:8081"

volumes:
  postgres-data:
  redis-data:
