<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gateway Control Plane API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
    <style>
        body {
            margin: 0;
            background: #191724;
            color: #e0def4;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .page-header {
            padding: 20px 24px;
            border-bottom: 1px solid #312f44;
            background: #1f1d2e;
        }

        .page-header h1 {
            margin: 0 0 6px;
            font-size: 24px;
        }

        .page-header p {
            margin: 0;
            color: #908caa;
            font-size: 14px;
        }

        #swagger-ui {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
    </style>
</head>
<body>
<header class="page-header">
    <h1>Gateway Control Plane API</h1>
    <p>Static OpenAPI documentation published from the Spring Boot control plane.</p>
</header>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
<script>
    window.onload = () => {
        window.ui = SwaggerUIBundle({
            url: "./openapi.json",
            dom_id: "#swagger-ui",
            deepLinking: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            layout: "BaseLayout"
        });
    };
</script>
</body>
</html>
